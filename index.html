<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tressage Ailleurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* BASE */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f6f1ee;
    color:#333;
}

/* HEADER */
header{
    background:#3a2d28;
    color:white;
    padding:30px;
    text-align:center;
}

header img{
    width:200px;        /* taille desktop */
    height:auto;
    display:block;
    margin:0 auto 15px auto;
}

header h1{
    margin:0;
    font-size:30px;
}

header p{
    margin-top:8px;
}

/* MENU */
nav{
    background:#5a463d;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

nav a{
    background:white;
    color:#3a2d28;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* ✅ CORRECTION MOBILE */
@media (max-width: 600px){

    header{
        padding:20px 15px;
    }

    header img{
        width:120px;          /* ✅ logo réduit sur mobile */
        margin-bottom:12px;
    }

    header h1{
        font-size:22px;       /* ✅ titre lisible */
        line-height:1.2;
    }

    header p{
        font-size:14px;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo Tressage Ailleurs">
    <h1>Tressage Ailleurs</h1>
    <p>Créations artisanales faites avec intention</p>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="articles.html">Articles</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="panier.html">Panier</a>
</nav>

</body>
</html>
