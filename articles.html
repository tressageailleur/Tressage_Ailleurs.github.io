<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Articles – Tressage Ailleurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f6f1ee; color:#333; }
header { background:#3a2d28; color:white; text-align:center; padding:30px; }
header img { width:180px; margin-bottom:10px; }
nav { background:#5a463d; padding:15px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
nav a { background:white; color:#3a2d28; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:bold; }

main { max-width:1000px; margin:40px auto; padding:0 20px; }
.produits { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; }
.produit { background:white; padding:20px; border-radius:12px; text-align:center; }
.produit img { width:100%; height:200px; object-fit:contain; background:#eee; }
button { margin-top:10px; padding:10px 18px; background:#3a2d28; color:white; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Logo Tressage Ailleurs">

</header>

<nav>

<main>

<script>
function ajouter(nom, prix, image){
  let panier = JSON.parse(localStorage.getItem("panier")) || [];
  panier.push({ nom, prix, image });
  localStorage.setItem("panier", JSON.stringify(panier));
  alert("Ajouté au panier");
}
</script>
