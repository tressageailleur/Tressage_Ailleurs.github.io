<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commandes – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f6f1ee;
    color:#333;
}

header{
    background:#3a2d28;
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.commande{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.commande h3{
    margin-top:0;
    color:#3a2d28;
}

.produit{
    margin-left:10px;
}

button{
    margin-top:10px;
    padding:8px 14px;
    background:#b33a3a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>Commandes</h1>
    <p>Historique des commandes (local)</p>
</header>

<div class="container" id="listeCommandes"></div>

<script>
const zone = document.getElementById("listeCommandes");
const commandes = JSON.parse(localStorage.getItem("commandes")) || [];

if(commandes.length === 0){
    zone.innerHTML = "<p>Aucune commande enregistrée.</p>";
}

commandes.forEach((c,i)=>{
    let html = `
    <div class="commande">
        <h3>Commande #${i+1}</h3>
        <p><strong>Date :</strong> ${c.date}</p>
        <p><strong>Produits :</strong></p>
    `;

    c.produits.forEach(p=>{
        html += `<div class="produit">- ${p.nom} (${p.prix} €)</div>`;
    });

    html += `
        <p><strong>Total :</strong> ${c.total}</p>
        <button onclick="supprimer(${i})">Supprimer cette commande</button>
    </div>
    `;

    zone.innerHTML += html;
});

function supprimer(index){
    commandes.splice(index,1);
    localStorage.setItem("commandes", JSON.stringify(commandes));
    location.reload();
}
</script>

</body>
</html>
