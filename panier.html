<!DOCTYPE html><!DOCTYPE html="fr">
<head>
<meta charset="UTF-8">
<title>Tressage Ailleurs – Panier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f6f1ee;
    color:#333;
}

/* ✅ BANDEAU PLUS VISIBLE + PLUS LENT */
.bandeau {
    background: linear-gradient(90deg, #ff9900, #ff3d00);
    color:white;
    font-weight:bold;
    font-size:18px;
    padding:12px 0;
    overflow:hidden;
    white-space:nowrap;
}
.bandeau span{
    display:inline-block;
    padding-left:100%;
    animation:defile 30s linear infinite; /* ✅ LENT */
}
@keyframes defile{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* HEADER */
header{
    background:#3a2d28;
    color:white;
    padding:30px;
    text-align:center;
}

/* MENU */
nav{
    background:#5a463d;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}
nav a{
    background:white;
    color:#3a2d28;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.panier{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.produits,
.resume{
    background:white;
    padding:20px;
    border-radius:12px;
}

.produit{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.supprimer{
    background:none;
    border:none;
    color:#a00;
    cursor:pointer;
}

.resume p{
    display:flex;
    justify-content:space-between;
}

.total{
    font-weight:bold;
    font-size:18px;
    border-top:2px solid #3a2d28;
    padding-top:10px;
}

input{
    width:100%;
    padding:8px;
    margin:6px 0;
}

button{
    width:100%;
    padding:10px;
    background:#3a2d28;
    color:white;
    border:none;
    cursor:pointer;
}

.vide{
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<!-- ✅ BANDEAU -->
<div class="bandeau">
    <span>
        🔥 PROMO TRESSAGE AILLEURS -10% 🔥 | ⚠️ Mobile : utilisez la navigation privée pour payer 📱
    </span>
</div>

<header>
<h1>Votre panier</h1>
<p>Récapitulatif de votre commande</p>
</header>

<nav>
<a href="index.html">Accueil</a>
<a href="articles.html">Articles</a>
<a href="article-personnalise.html">Article personnalisé</a>
<a href="abonnements.html">Abonnements</a>
<a href="panier.html">Panier</a>
</nav>

<div class="container">

<div class="panier">

<div class="produits">
<h2>Produits</h2>
<div id="listeProduits"></div>
</div>

<div class="resume">
<h2>Résumé</h2>

<p><span>Sous‑total</span><span id="sousTotal">0 €</span></p>
<p><span>Frais livraison</span><span id="frais">0 €</span></p>

<input id="codePromo" placeholder="TRESSAGE10 ou COLLABORATION">
<button onclick="appliquerPromo()">Appliquer</button>

<input id="nomPrenom" placeholder="Nom prénom">
<input id="adresseLivraison" placeholder="Adresse">

<p class="total"><span>Total</span><span id="total">0 €</span></p>

<button onclick="finaliserCommande()">Finaliser la commande</button>

</div>
</div>
</div>

<!-- ✅ PAYPAL -->
<form id="paypalForm" method="post" action="https://www.paypal.com/cgi-bin/webscr" style="display:none">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="Tressageailleur@gmail.com">
<input type="hidden" name="item_name" value="Commande Tressage Ailleurs">
<input type="hidden" name="currency_code" value="EUR">
<input type="hidden" name="amount" id="paypalAmount">
</form>

<script>
let panier = JSON.parse(localStorage.getItem("panier")) || [];
let remise = 0;

function afficherPanier(){
let zone = document.getElementById("listeProduits");
zone.innerHTML = "";

if(panier.length === 0){
zone.innerHTML = "<p class='vide'>Panier vide</p>";
recalculer();
return;
}

panier.forEach((p,i)=>{
zone.innerHTML += `
<div class="produit">
<span>${p.nom}</span>
<span>${Number(p.prix).toFixed(2)} € 
<button onclick="supprimer(${i})">❌</button>
</span>
</div>`;
});

recalculer();
}

function recalculer(){
let totalProduits = panier.reduce((s,p)=>s+Number(p.prix),0);
let sous = totalProduits - remise;
if(sous<0) sous=0;

let frais = panier.length ? 3 : 0;

sousTotal.textContent = sous.toFixed(2)+" €";
fraisEl.textContent = frais ? frais.toFixed(2)+" €":"0 €";
total.textContent = (sous+frais).toFixed(2)+" €";
}

const sousTotal=document.getElementById("sousTotal");
const fraisEl=document.getElementById("frais");
const total=document.getElementById("total");

/* ✅ PROMOS CORRIGÉES */
function appliquerPromo(){
let code=document.getElementById("codePromo").value.toLowerCase().replace(/\s+/g,"");
let totalProduits = panier.reduce((s,p)=>s+Number(p.prix),0);

if(code==="tressage10"){
remise = totalProduits*0.10;
alert("✅ -10%");
}
else if(code==="collaboration" || code==="collab"){
remise = totalProduits*0.30;
alert("✅ -30%");
}
else{
remise=0;
alert("❌ Code invalide");
}
recalculer();
}

function supprimer(i){
panier.splice(i,1);
localStorage.setItem("panier",JSON.stringify(panier));
afficherPanier();
}

function finaliserCommande(){
if(!panier.length) return alert("Panier vide");

paypalAmount.value = total.textContent.replace(" €","");
paypalForm.submit();
}

afficherPanier();
</script>

</body>
</html>
