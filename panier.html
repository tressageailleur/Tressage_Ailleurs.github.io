<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tressage Ailleurs – Panier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f6f1ee;
    color:#333;
}

/* HEADER */
header{
    background:#3a2d28;
    color:white;
    padding:30px;
    text-align:center;
}

/* MENU */
nav{
    background:#5a463d;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}
nav a{
    background:white;
    color:#3a2d28;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* CONTENEUR */
.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

/* PANIER */
.panier{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.produits,
.resume{
    background:white;
    padding:20px;
    border-radius:12px;
}

.produit{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding:10px 0;
}
.produit:last-child{
    border-bottom:none;
}

.supprimer{
    background:none;
    border:none;
    color:#a00;
    font-size:18px;
    cursor:pointer;
}

/* RÉSUMÉ */
.resume p{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total{
    font-weight:bold;
    font-size:18px;
    border-top:2px solid #3a2d28;
    padding-top:10px;
}

/* PROMO */
.promo input{
    width:100%;
    padding:8px;
    margin-top:5px;
}

.promo button,
.action button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#3a2d28;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* PANIER VIDE */
.vide{
    text-align:center;
    font-style:italic;
    color:#666;
}

/* CONFIRMATION */
.confirmation{
    display:none;
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
}
.confirmation h2{
    margin-top:0;
    color:#3a2d28;
}

/* RESPONSIVE */
@media(max-width:800px){
    .panier{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>Votre panier</h1>
    <p>Récapitulatif de votre commande</p>
</header>

<!-- ✅ MENU CORRECT ET VISIBLE -->
<nav>
    <a href="index.html">Accueil</a>
    <a href="articles.html">Articles</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="panier.html">Panier</a>
</nav>

<div class="container">

<div id="zonePanier" class="panier">

    <div class="produits">
        <h2>Produits</h2>
        <div id="listeProduits"></div>
    </div>

    <div class="resume">
        <h2>Résumé</h2>

        <p><span>Sous‑total</span><span id="sousTotal">0 €</span></p>
        <p><span>Frais</span><span id="frais">0 €</span></p>

        <div class="promo">
            <label>Code promotionnel</label>
            <input id="codePromo" placeholder="PROMO10">
            <button onclick="appliquerPromo()">Appliquer</button>
        </div>

        <p class="total"><span>Total</span><span id="total">0 €</span></p>

        <div class="action">
            <button onclick="finaliserCommande()">Finaliser la commande</button>
        </div>
    </div>

</div>

<div id="confirmation" class="confirmation">
    <h2>Merci pour votre commande</h2>
    <p>
        Un email s’est ouvert pour confirmer la commande.<br>
        Vous pouvez maintenant nous contacter si besoin.
    </p>
</div>

</div>

<script>
let panier = JSON.parse(localStorage.getItem("panier")) || [];
let remise = 0;
let fraisFixes = 3;
const zone = document.getElementById("listeProduits");

function afficherPanier(){
    zone.innerHTML = "";

    if(panier.length === 0){
        zone.innerHTML = "<p class='vide'>Votre panier est vide</p>";
        recalculer();
        return;
    }

    panier.forEach((p,i)=>{
        zone.innerHTML += `
        <div class="produit">
            <span>${p.nom}</span>
            <div>
                <span>${p.prix} €</span>
                <button class="supprimer" onclick="supprimer(${i})">❌</button>
            </div>
        </div>`;
    });

    recalculer();
}

function recalculer(){
    let sousTotal = panier.reduce((s,p)=>s+p.prix,0) - remise;
    if(sousTotal < 0) sousTotal = 0;

    document.getElementById("sousTotal").textContent = sousTotal.toFixed(2)+" €";
    document.getElementById("frais").textContent =
        panier.length ? fraisFixes+" €" : "0 €";
    document.getElementById("total").textContent =
        (sousTotal + (panier.length ? fraisFixes : 0)).toFixed(2)+" €";
}

function appliquerPromo(){
    remise = 0;
    fraisFixes = 3;
    const code = document.getElementById("codePromo").value.trim().toUpperCase();

    if(code === "TRESSAGE"){
        remise = panier.reduce((s,p)=>s+p.prix,0) * 0.10;
          fraisFixes = 0;
        alert("Livraison offerte");
    }else{
        alert("Code invalide");
    }
    recalculer();
}

function supprimer(index){
    panier.splice(index,1);
    localStorage.setItem("panier", JSON.stringify(panier));
    afficherPanier();
}

/* ✅ ENVOI PAR EMAIL */
function finaliserCommande(){
    if(panier.length === 0){
        alert("Votre panier est vide");
        return;
    }

    let message = "Nouvelle commande – Tressage Ailleurs\n\n";
    panier.forEach(p=>{
        message += `- ${p.nom} : ${p.prix} €\n`;
    });
    message += "\nTOTAL : " + document.getElementById("total").textContent;

    window.location.href =
        "mailto:Tressageailleur@gmail.com"
        + "?subject=" + encodeURIComponent("Nouvelle commande – Tressage Ailleurs")
        + "&body=" + encodeURIComponent(message);

    localStorage.removeItem("panier");
    document.getElementById("zonePanier").style.display = "none";
    document.getElementById("confirmation").style.display = "block";
}

afficherPanier();
</script>

</body>
</html>
