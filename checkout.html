<script>
let panier = JSON.parse(localStorage.getItem("panier")) || [];
let total = panier.reduce((s,p)=>s+p.prix,0);
let livraison = 3;

function afficherTotal(){
    document.getElementById("total").textContent = total + livraison;
}

function appliquerPromo(){
    const code = document.getElementById("promo").value.toUpperCase();

    if(code === "PROMO10"){
        total = total * 0.9;
        alert("-10% appliqué");
    }

    if(code === "LIVRAISON"){
        livraison = 0;
        alert("Livraison offerte");
    }

    afficherTotal();
}

function validerCommande(){
    alert("Commande validée ✅ (paiement simulé)");
    localStorage.removeItem("panier");
    window.location.href = "index.html";
}

afficherTotal();
</script>
