<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tressage Ailleurs – Abonnements</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f1ee;
    color: #333;
}

/* HEADER */
header {
    position: relative;
    background: #3a2d28;
    color: white;
    padding: 40px 20px;
    text-align: center;
}

.logo {
    position: absolute;
    top: 15px;
    left: 20px;
    width: 110px;
    background: white;
    border-radius: 50%;
    padding: 6px;
}

/* MENU */
nav {
    background: #5a463d;
    padding: 18px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

nav a {
    background: #f6f1ee;
    color: #3a2d28;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    background: #e6dad3;
}

/* CONTENU */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px 20px;
}

.abonnements {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
}

/* CARTE ABONNEMENT */
.abo {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    overflow: hidden;
    text-align: center;
}

.abo img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    background: #eee;
}

.abo .texte {
    padding: 20px;
}

.prix {
    font-weight: bold;
    font-size: 18px;
    margin: 12px 0;
}

button {
    background: #3a2d28;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #5a463d;
}

/* FOOTER */
footer {
    background: #3a2d28;
    color: white;
    text-align: center;
    padding: 15px;
}

/* PANIER FLOTTANT */
.panier-flottant {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #3a2d28;
    color: white;
    padding: 14px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.panier-flottant:hover {
    background: #5a463d;
}
</style>

<!-- 🔐 PRIX DES ABONNEMENTS (MODIFIABLES PAR TOI) -->
<script>
const PRIX_ABO_1 = 10;
const PRIX_ABO_3 = 24;
const PRIX_ABO_6 = 42;
</script>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Tressage Ailleurs</h1>
    <p>Abonnements – Box bracelets artisanaux</p>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="presentation.html">Présentation</a>
    <a href="articles.html">Articles</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="panier.html">🛒 Panier</a>
</nav>

<div class="container">
    <div class="abonnements">

        <!-- ABONNEMENT 1 MOIS -->
        <div class="abo">
            <img src="box-abonnement.jpg" alt="Box abonnement 1 mois">
            <div class="texte">
                <h3>Abonnement 1 mois</h3>
                <p class="prix" id="prix1"></p>
                <p>Découvrir l’univers Tressage Ailleurs.</p>
                <button onclick="ajouterAuPanier('Abonnement 1 mois', PRIX_ABO_1)">
                    Ajouter au panier
                </button>
            </div>
        </div>

        <!-- ABONNEMENT 3 MOIS -->
        <div class="abo">
            <img src="box-abonnement.jpg" alt="Box abonnement 3 mois">
            <div class="texte">
                <h3>Abonnement 3 mois</h3>
                <p class="prix" id="prix3"></p>
                <p>Soit 7 € par mois.</p>
                <button onclick="ajouterAuPanier('Abonnement 3 mois', PRIX_ABO_3)">
                    Ajouter au panier
                </button>
            </div>
        </div>

        <!-- ABONNEMENT 6 MOIS -->
        <div class="abo">
            <img src="box-abonnement.jpg" alt="Box abonnement 6 mois">
            <div class="texte">
                <h3>Abonnement 6 mois</h3>
                <p class="prix" id="prix6"></p>
                <p>Soit 8 € par mois.</p>
                <button onclick="ajouterAuPanier('Abonnement 6 mois', PRIX_ABO_6)">
                    Ajouter au panier
                </button>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2026 – Tressage Ailleurs
</footer>

<!-- BOUTON PANIER FLOTTANT -->
<a href="panier.html" class="panier-flottant">🛒 Panier</a>

<script>
/* AFFICHAGE DES PRIX */
document.getElementById("prix1").textContent = PRIX_ABO_1 + " €";
document.getElementById("prix3").textContent = PRIX_ABO_3 + " €";
document.getElementById("prix6").textContent = PRIX_ABO_6 + " €";

/* AJOUT AU PANIER */
function ajouterAuPanier(nom, prix) {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];
    panier.push({
        nom: nom,
        prix: prix,
        image: "box-abonnement.jpg"
    });
    localStorage.setItem("panier", JSON.stringify(panier));
    alert("Abonnement ajouté au panier");
}
</script>

</body>
</html>
