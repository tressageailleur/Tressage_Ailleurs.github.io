<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Abonnements – Tressage Ailleurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f6f1ee;color:#333}
header{background:#3a2d28;color:white;text-align:center;padding:30px}
header img{width:180px;margin:0 auto 15px;display:block}
nav{
    background:#5a463d;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap
}
nav a{
    background:white;
    color:#3a2d28;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold
}
main{
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px
}
.offre{
    background:white;
    border-radius:14px;
    padding:25px;
    text-align:center
}
.offre img{
    width:100%;
    max-width:220px;
    object-fit:contain;
    background:#eee
}
button{
    margin-top:15px;
    padding:10px 18px;
    background:#3a2d28;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer
}
@media(max-width:600px){
    header img{width:120px}
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo Tressage Ailleurs">
    <h1>Abonnements</h1>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="articles.html">Articles</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="panier.html">Panier</a>
</nav>

<main>

<div class="offre">
    <img src="box-abonnement.jpg" alt="Box 1 mois">
    <h3>Box – 1 mois</h3>
    <p><strong>10 €</strong></p>
    <button onclick="ajouter('Box abonnement – 1 mois', 10)">Ajouter au panier</button>
</div>

<div class="offre">
    <img src="box-abonnement.jpg" alt="Box 3 mois">
    <h3>Box – 3 mois</h3>
    <p><strong>24 €</strong></p>
    <button onclick="ajouter('Box abonnement – 3 mois', 24)">Ajouter au panier</button>
</div>

<div class="offre">
    <img src="box-abonnement.jpg" alt="Box 6 mois">
    <h3>Box – 6 mois</h3>
    <p><strong>34 €</strong></p>
    <button onclick="ajouter('Box abonnement – 6 mois', 34)">Ajouter au panier</button>
</div>

</main>

<script>
function ajouter(nom, prix){
    let panier = JSON.parse(localStorage.getItem("panier")) || [];
    panier.push({ nom, prix, image:"box-abonnement.jpg" });
    localStorage.setItem("panier", JSON.stringify(panier));
    alert("Abonnement ajouté au panier");
}
</script>

</body>
</html>
