<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Article personnalisé</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f6f1ee;
  color:#333;
}
header{
  background:#3a2d28;
  color:white;
  text-align:center;
  padding:30px;
}

/* MENU */
nav{
    background:#5a463d;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

nav a{
    background:white;
    color:#3a2d28;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
main{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}
label{
  display:block;
  margin-top:18px;
  font-weight:bold;
}
select, input, textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
}
textarea{resize:none;}
.hidden{display:none;}
button{
  width:100%;
  margin-top:25px;
  padding:12px;
  background:#3a2d28;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Article personnalisé</h1>
  <p>Créez votre bijou sur mesure</p>
</header>

<!-- ✅ MENU 100 % VALIDE -->
<nav class="menu">
  <a href="index.html">Accueil</a>
  <a href="articles.html">Articles</a>
  <a href="abonnements.html">Abonnements</a>
  <a href="panier.html">Panier</a>
</nav>

<main>

<label>Type de bijou</label>
<select id="type">
  <option value="">— Choisir —</option>
  <option value="boucle">Boucle d’oreille – 4 €</option>
  <option value="bracelet">Bracelet – 2 €</option>
  <option value="charme">Charme – 1 €</option>
</select>

<label>Couleur</label>
<select id="couleur">
  <option>Rouge</option>
  <option>Rose</option>
  <option>Gris</option>
  <option>Vert foncé</option>
  <option>Marron</option>
</select>

<div id="blocBoucle" class="hidden">
  <label>Type d’attache</label>
  <select id="attache">
    <option>Créole</option>
    <option>Crochet</option>
  </select>
</div>

<div id="blocBracelet" class="hidden">
  <label>Forme du bracelet</label>
  <input id="formeBracelet">
</div>

<div id="blocCharme" class="hidden">
  <label>Taille du charme</label>
  <select id="tailleCharme">
    <option>Petit</option>
    <option>Moyen</option>
    <option>Grand</option>
  </select>
  <label>Forme du charme</label>
  <input id="formeCharme">
</div>

<label>Message personnalisé</label>
<textarea id="message" maxlength="30"></textarea>

<button id="ajouter">Ajouter au panier</button>

</main>

<script>
const typeSelect=document.getElementById("type");
const b1=document.getElementById("blocBoucle");
const b2=document.getElementById("blocBracelet");
const b3=document.getElementById("blocCharme");

typeSelect.addEventListener("change",()=>{
  b1.classList.add("hidden");
  b2.classList.add("hidden");
  b3.classList.add("hidden");
  if(typeSelect.value==="boucle") b1.classList.remove("hidden");
  if(typeSelect.value==="bracelet") b2.classList.remove("hidden");
  if(typeSelect.value==="charme") b3.classList.remove("hidden");
});

document.getElementById("ajouter").onclick=()=>{
  let panier=JSON.parse(localStorage.getItem("panier"))||[];
  panier.push({nom:"Article personnalisé",prix:1,image:"logo.png"});
  localStorage.setItem("panier",JSON.stringify(panier));
  alert("Article bien ajouté au panier ✅");
};
</script>

</body>
</html>
