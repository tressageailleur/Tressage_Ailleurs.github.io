<!DOCTYPE html>< lang="fr">
<head>
<meta charset="UTF-8">
<title>Article personnalisé</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f6f1ee;
  color:#333;
}

/* HEADER */
header{
  background:#3a2d28;
  color:white;
  text-align:center;
  padding:30px;
}
header img{
  max-width:120px;
  display:block;
  margin:0 auto 10px;
}

/* MENU */
.menu{
  background:#5a463d;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.menu a{
  background:white;
  color:#3a2d28;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* CONTENU */
main{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

label{
  display:block;
  margin-top:18px;
  font-weight:bold;
}

select, input, textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
}

textarea{resize:none;}
.hidden{display:none;}

button{
  width:100%;
  margin-top:25px;
  padding:12px;
  background:#3a2d28;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Logo">
  <h1>Article personnalisé</h1>
  <p>Créez votre bijou sur mesure</p>
</header>

<nav class="menu">
  <a href="index.html">Accueil</a>
  <a href="articles.html">Articles</a>
  <a href="abonnements.html">Abonnements</a>
  <a href="panier.html">Panier</a>
</nav>

<main>

<label>Type de bijou</label>
<select id="type">
  <option value="">— Choisir —</option>
  <option value="boucle">Boucle d’oreille – 5 €</option>
  <option value="bracelet">Bracelet – 3 €</option>
  <option value="charme">Charme – 1 €</option>
  <option value="Pendentifs">Pendentifs – 1 €</option>
</select>

<!-- BOUCLES -->
<div id="blocBoucle" class="hidden">
  <label>Type d’attache</label>
  <select id="attache">
    <option>Créole</option>
    <option>Crochet</option>
  </select>

  <label>Couleur</label>
  <select id="couleurBoucle">
    <option>Rouge</option>
    <option>Rose</option>
    <option>Gris</option>
    <option>Noir</option>
  </select>
</div>

<!-- BRACELET -->
<div id="blocBracelet" class="hidden">

  <label>Nombre de fils</label>
  <select id="nbFils">
    <option value="">— Choisir —</option>
    <option value="3">3 fils</option>
    <option value="4">4 fils</option>
    <option value="5">5 fils</option>
    <option value="6">6 fils</option>
    <option value="7">7 fils</option>
    <option value="8">8 fils</option>
    <option value="9">9 fils</option>
  </select>

  <div id="filsContainer"></div>

  <label>Forme du bracelet</label>
  <input id="formeBracelet" placeholder="Ex : torsadé, plat">
</div>

<!-- ✅ CHARME CORRIGÉ -->
<div id="blocCharme" class="hidden">
  <label>Taille du charme</label>
  <select id="tailleCharme">
    <option>Petit</option>
    <option>Moyen</option>
    <option>Grand</option>
  </select>

  <label>Forme du charme</label>
  <input id="formeCharme">
</div>

<!-- ✅ PENDENTIFS -->
<div id="blocPendentifs" class="hidden">
  <label>Taille du Pendentif</label>
  <select id="taillePendentifs">
    <option>Petit</option>
    <option>Moyen</option>
    <option>Grand</option>
  </select>

  <label>Forme du Pendentif</label>
  <input id="formePendentifs">
</div>

<label>Message personnalisé</label>
<textarea id="message"></textarea>

<button id="ajouter">Ajouter au panier</button>

</main>

<script>
const type = document.getElementById("type");
const blocBoucle = document.getElementById("blocBoucle");
const blocBracelet = document.getElementById("blocBracelet");
const blocCharme = document.getElementById("blocCharme");
const blocPendentifs = document.getElementById("blocPendentifs"); // ✅ AJOUT
const filsContainer = document.getElementById("filsContainer");

const couleurs = ["Rouge","Rose","Gris","Noir","Blanc","Bleu","Vert","Jaune","Violet","Marron"];

type.addEventListener("change", () => {
  blocBoucle.classList.add("hidden");
  blocBracelet.classList.add("hidden");
  blocCharme.classList.add("hidden");
  blocPendentifs.classList.add("hidden"); // ✅ AJOUT

  if(type.value === "boucle") blocBoucle.classList.remove("hidden");
  if(type.value === "bracelet") blocBracelet.classList.remove("hidden");
  if(type.value === "charme") blocCharme.classList.remove("hidden");
  if(type.value === "Pendentifs") blocPendentifs.classList.remove("hidden"); // ✅ AJOUT
});

nbFils.addEventListener("change", ()=>{
  filsContainer.innerHTML="";
  const nb = nbFils.value;
  if(!nb) return;

  for(let i=1;i<=nb;i++){
    const label=document.createElement("label");
    label.textContent="Fil "+i;

    const input=document.createElement("input");
    input.className="infoFil";

    const select=document.createElement("select");
    select.className="couleurFil";

    couleurs.forEach(c=>{
      const opt=document.createElement("option");
      opt.textContent=c;
      select.appendChild(opt);
    });

    filsContainer.appendChild(label);
    filsContainer.appendChild(input);
    filsContainer.appendChild(select);
  }
});

/* ✅ PANIER CORRIGÉ POUR TOUS */
ajouter.addEventListener("click", ()=>{
  let prix = type.value==="boucle"?5:type.value==="bracelet"?3:1;

  let nom="Article personnalisé - "+type.value;

  if(type.value==="bracelet"){
    nom+=" / "+nbFils.value+" fils";
    document.querySelectorAll(".infoFil").forEach((i,idx)=>{
      nom+=" / Fil "+(idx+1)+" ("+i.value+") : "
        +document.querySelectorAll(".couleurFil")[idx].value;
    });
    nom+=" / Forme : "+formeBracelet.value;
  }

  // ✅ CHARME
  if(type.value==="charme"){
    nom+=" / Taille : "+tailleCharme.value;
    nom+=" / Forme : "+formeCharme.value;
  }

  // ✅ PENDENTIFS (comme bracelet)
  if(type.value==="Pendentifs"){
    nom+=" / Taille : "+taillePendentifs.value;
    nom+=" / Forme : "+formePendentifs.value;
  }

  let panier=JSON.parse(localStorage.getItem("panier"))||[];
  panier.push({nom,prix,image:"logo.png"});
  localStorage.setItem("panier",JSON.stringify(panier));

  alert("Article bien ajouté ✅");
});
</script>

</body>
</html>
